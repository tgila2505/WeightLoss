name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install pnpm (THIS FIXES YOUR ERROR)
      - name: Install pnpm globally
        run: npm install -g pnpm

      # 4. Verify pnpm (debug safety)
      - name: Verify pnpm
        run: pnpm --version

      # 5. Install dependencies (workspace root)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 6. Build frontend (optional)
      - name: Build frontend
        run: |
          cd frontend
          pnpm build || echo "No build step yet"