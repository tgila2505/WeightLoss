name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 3. Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      # 4. Install dependencies (ROOT - VERY IMPORTANT)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Verify frontend builds (optional but good)
      - name: Build frontend
        run: |
          cd frontend
          pnpm build || echo "No build step yet"