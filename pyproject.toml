[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = [
  "Documentation"
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I"
]
ignore = [
  "F821",  # SQLAlchemy forward references (Mapped["User"]) are false positives
  "E402",  # Module-level imports not at top — conditional imports pattern
  "E741",  # Ambiguous variable names — acceptable in domain code
]

[tool.ruff.lint.per-file-ignores]
"backend/alembic/versions/*.py" = ["E501"]  # Auto-generated migrations

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
